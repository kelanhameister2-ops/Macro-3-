// ── LIGHTWEIGHT CHART COMPONENTS (no external deps) ──────────────────
function SVGLineChart({data, dataKey, color="#4D9EF8", height=100, width="100%"}){
  if(!data||data.length<2) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#404040",fontSize:11}}>No data</div>;
  const vals = data.map(d=>+d[dataKey]||0).filter(v=>v>0);
  if(!vals.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#404040",fontSize:11}}>No data</div>;
  const mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||1;
  const W=300, H=height-20, PAD=4;
  const pts = data.map((d,i)=>{
    const v=+d[dataKey]||0;
    const x=(i/(data.length-1))*(W-PAD*2)+PAD;
    const y=H-((v-mn)/rng)*(H-PAD*2)-PAD;
    return `${x},${y}`;
  }).join(" ");
  const labels = data.filter((_,i)=>i===0||i===data.length-1||i===Math.floor(data.length/2));
  return(
    <svg viewBox={`0 0 ${W} ${H+20}`} style={{width:"100%",height}} preserveAspectRatio="none">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {data.map((d,i)=>{
        const v=+d[dataKey]||0;
        if(!v) return null;
        const x=(i/(data.length-1))*(W-PAD*2)+PAD;
        const y=H-((v-mn)/rng)*(H-PAD*2)-PAD;
        return <circle key={i} cx={x} cy={y} r="3" fill={color}/>;
      })}
      {data.map((d,i)=>{
        if(i!==0&&i!==data.length-1&&i!==Math.floor(data.length/2)) return null;
        const x=(i/(data.length-1))*(W-PAD*2)+PAD;
        return <text key={i} x={x} y={H+14} textAnchor="middle" fontSize="8" fill="#606060">{d.date||""}</text>;
      })}
    </svg>
  );
}

function SVGBarChart({data, dataKey, color="#4D9EF8", refLine=0, height=120, getColor=null}){
  if(!data||!data.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#404040",fontSize:11}}>No data</div>;
  const vals = data.map(d=>+d[dataKey]||0);
  const mx = Math.max(...vals, refLine||0, 1);
  const W=300, H=height-20, PAD=2;
  const bw = (W - PAD*2*(data.length+1)) / data.length;
  return(
    <svg viewBox={`0 0 ${W} ${H+20}`} style={{width:"100%",height}} preserveAspectRatio="none">
      {refLine>0&&<line x1={PAD} y1={H-((refLine/mx)*(H-PAD*2))-PAD} x2={W-PAD} y2={H-((refLine/mx)*(H-PAD*2))-PAD} stroke="#FF6B47" strokeWidth="1.5" strokeDasharray="4,3" opacity="0.7"/>}
      {data.map((d,i)=>{
        const v=+d[dataKey]||0;
        const bh=Math.max((v/mx)*(H-PAD*2),v>0?2:0);
        const x=PAD*(i+1)+bw*i;
        const y=H-bh-PAD;
        const c = getColor ? getColor(d,i) : color;
        return <rect key={i} x={x} y={y} width={bw} height={bh} fill={c} rx="2"/>;
      })}
      {data.map((d,i)=>{
        if(i!==0&&i!==data.length-1&&i!==Math.floor(data.length/2)) return null;
        const x=PAD*(i+1)+bw*i+bw/2;
        return <text key={i} x={x} y={H+14} textAnchor="middle" fontSize="8" fill="#606060">{d.date||""}</text>;
      })}
    </svg>
  );
}

function SVGSparkline({data, dataKey, color="#B39DFA", height=48}){
  if(!data||data.length<2) return <div style={{height}}/>;
  const vals=data.map(d=>+d[dataKey]||0).filter(v=>v>0);
  if(vals.length<2) return <div style={{height}}/>;
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=200,H=height,PAD=3;
  const pts=data.filter(d=>+d[dataKey]>0).map((d,i,arr)=>{
    const x=(i/(arr.length-1))*(W-PAD*2)+PAD;
    const y=H-((+d[dataKey]-mn)/rng)*(H-PAD*2)-PAD;
    return `${x},${y}`;
  }).join(" ");
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height}} preserveAspectRatio="none">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function MiniBarRow({val, max, color}){
  const p = max>0 ? Math.min((val/max)*100, 100) : 0;
  return <div style={{height:4,background:"#262626",borderRadius:100,overflow:"hidden"}}><div style={{height:"100%",width:`${p}%`,background:color,borderRadius:100,transition:"width .4s"}}/></div>;
}

// ── UTILITIES ──────────────────────────────────────────────────────────
const td = () => new Date().toISOString().split("T")[0];
const fmtD  = d => new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const fmtDs = d => new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
const dMinus = (s,n) => { const d=new Date(s+"T12:00:00"); d.setDate(d.getDate()-n); return d.toISOString().split("T")[0]; };
const dPlus  = (s,n) => { const d=new Date(s+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };
const pastN  = (n,from=td()) => Array.from({length:n},(_,i)=>dMinus(from,n-1-i));
const pct    = (v,t) => (!t||t<=0)?0:Math.min(Math.round(v/t*100),999);
const clamp  = (v,mn,mx) => Math.min(Math.max(v,mn),mx);

const sumDay = dl => {
  if(!dl?.meals) return {cal:0,p:0,f:0,c:0,na:0,k:0,fb:0,w:0};
  return Object.values(dl.meals).flat().reduce((a,e)=>({
    cal:a.cal+(+e.cal||0), p:a.p+(+e.p||0), f:a.f+(+e.f||0), c:a.c+(+e.c||0),
    na:a.na+(+e.na||0),    k:a.k+(+e.k||0), fb:a.fb+(+e.fb||0), w:a.w+(+e.w||0),
  }),{cal:0,p:0,f:0,c:0,na:0,k:0,fb:0,w:0});
};

const wtTrend = wts => {
  if(!wts.length) return {cur:null,avg:null,chg:null,data:[]};
  const s=[...wts].sort((a,b)=>a.date.localeCompare(b.date));
  const r=s.slice(-7), cur=r[r.length-1]?.w||null;
  const avg=r.length?+(r.reduce((a,x)=>a+x.w,0)/r.length).toFixed(1):null;
  const pv=s.slice(-14,-7);
  const pa=pv.length?pv.reduce((a,x)=>a+x.w,0)/pv.length:null;
  return {cur,avg,chg:(avg&&pa)?+(avg-pa).toFixed(1):null,data:r};
};

const MEALS=["Morning","Midday","Afternoon","Evening","Night"];

  strategy:{goal:null,programStyle:null,program:null,contestDate:null},

  logs:{},
  metrics:{weights:[],bodyfat:[],measurements:[],hydration:[],photos:[],digestion:[],performance:[]},
  ui:{logDate:td(),aRange:"7d",aSec:"weight"},
};

function reduce(st,a){
  switch(a.t){
    case "SCREEN":   return{...st,screen:a.v};
    case "TAB":      return{...st,tab:a.v};
    case "MODAL":    return{...st,modal:a.v};
    case "OB_NEXT":  return{...st,ob:{...st.ob,step:st.ob.step+1}};
    case "OB_BACK":  return{...st,ob:{...st.ob,step:Math.max(0,st.ob.step-1)}};
    case "OB_DONE":  return{...st,screen:"main"};
    case "PROFILE":  return{...st,profile:{...st.profile,...a.v}};
    case "STRATEGY": return{...st,strategy:{...st.strategy,...a.v}};
    case "TARGETS":  return{...st,targets:{...st.targets,...a.v}};
    case "LOG_FOOD":{
      const{date,meal,entry}=a;
      const dl=st.logs[date]||{meals:{},note:""};
      return{...st,logs:{...st.logs,[date]:{...dl,meals:{...dl.meals,[meal]:[...(dl.meals[meal]||[]),entry]}}}};
    }
    case "DEL_FOOD":{
      const dl=st.logs[a.date]; if(!dl)return st;
      return{...st,logs:{...st.logs,[a.date]:{...dl,meals:{...dl.meals,[a.meal]:(dl.meals[a.meal]||[]).filter((_,i)=>i!==a.idx)}}}};
    }
    case "LOG_NOTE":{
      const dl=st.logs[a.date]||{meals:{},note:""};
      return{...st,logs:{...st.logs,[a.date]:{...dl,note:a.note}}};
    }
    case "LOG_W":    return{...st,metrics:{...st.metrics,weights:[...st.metrics.weights,a.v]}};
    case "LOG_BF":   return{...st,metrics:{...st.metrics,bodyfat:[...st.metrics.bodyfat,a.v]}};
    case "LOG_MEAS": return{...st,metrics:{...st.metrics,measurements:[...st.metrics.measurements,a.v]}};
    case "LOG_H":    return{...st,metrics:{...st.metrics,hydration:[...st.metrics.hydration,a.v]}};
    case "LOG_DIG":  return{...st,metrics:{...st.metrics,digestion:[...st.metrics.digestion,a.v]}};
    case "LOG_PERF": return{...st,metrics:{...st.metrics,performance:[...st.metrics.performance,a.v]}};
    case "UI":       return{...st,ui:{...st.ui,...a.v}};
    default: return st;
  }
}

// ── SHARED COMPONENTS ─────────────────────────────────────────────────
function Ring({size=136,stroke=9,val=0,max=1,color=C.cal,children}){
  const r=(size-stroke)/2, circ=2*Math.PI*r;
  const ratio=max>0?clamp(val/max,0,1):0;
  const off=circ-ratio*circ;
  const rc=ratio>1.05?C.danger:ratio>0.88?C.warn:color;
  return(
    <div style={{position:"relative",width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <svg width={size} height={size} style={{position:"absolute",transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.s4} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={rc} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:"stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)"}}/>
      </svg>
      <div style={{position:"relative",textAlign:"center"}}>{children}</div>
    </div>
  );
}

function MBar({label,val,tgt,color,unit="g"}){

function Empty({icon,title,sub,onAct,actLabel}){
  return(
    <div className="em">
      <div style={{color:C.t2}}>{icon}</div>
      <div style={{fontWeight:600,fontSize:15}}>{title}</div>

      {onAct&&<button className="pill on" style={{marginTop:6}} onClick={onAct}>{actLabel}</button>}

  );
}

function useToast(){
  const[msg,setMsg]=useState(null);
  const show=useCallback(m=>{setMsg(m);setTimeout(()=>setMsg(null),2200);},[]);
  return{msg,show};
}

        {Object.values(dl?.meals||{}).some(m=>m.length>0)&&(

            <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Day Totals — Micros</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[{l:"Fiber",v:tot.fb,t:tg.fb,c:C.fiber,u:"g"},{l:"Sodium",v:tot.na,t:tg.na,c:C.sodium,u:"mg"},{l:"Potassium",v:tot.k,t:tg.k,c:C.potassium,u:"mg"},{l:"Water",v:tot.w,t:tg.w,c:C.water,u:"L"}].map(({l,v,t,c,u})=>(

                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:11,color:c,fontWeight:600}}>{l}</span>
                    <span style={{fontFamily:F.mn,fontSize:10,color:C.t2}}>{v}{u}</span>

                  <div className="btr"><div className="btf" style={{width:`${clamp(pct(v,t),0,100)}%`,background:c}}/></div>

        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>Day Note</div>
          <textarea className="inp" rows={2} placeholder="Optional: digestion notes, carb observations, meal timing..." style={{resize:"none",fontFamily:F.bd,lineHeight:1.5}}
            value={dl?.note||""} onChange={e=>dp({t:"LOG_NOTE",date:dateStr,note:e.target.value})}/>

  );
}

  <script type="text/babel">
function Analytics({st,dp}){

  const setRange=v=>dp({t:"UI",v:{aRange:v}});
  const setSec=v=>dp({t:"UI",v:{aSec:v}});

  const nDays=range==="7d"?7:range==="30d"?30:90;

  const wData=useMemo(()=>{
    const wm={};mx.weights.forEach(w=>wm[w.date]=w.w);
    return days.map(d=>({date:d.slice(5),w:wm[d]||null})).filter(d=>d.w);
  },[mx.weights,days]);

  const nData=useMemo(()=>days.map(d=>{const t=sumDay(logs[d]);return{date:d.slice(5),...t,tgt:tg.cal||0};}),[logs,days,tg.cal]);

  const wData2=useMemo(()=>days.map(d=>({date:d.slice(5),L:mx.hydration.filter(h=>h.date===d).reduce((s,h)=>s+h.liters,0)})),[mx.hydration,days]);

  const dData=useMemo(()=>{const dm={};mx.digestion.forEach(d=>dm[d.date]=d.score);return days.map(d=>({date:d.slice(5),s:dm[d]||null})).filter(d=>d.s);},[mx.digestion,days]);

      </div>

      <div style={{padding:"0 16px"}}>

        {sec==="weight"&&(
          <div className="fu">
            <div className="card" style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <div><div style={{fontWeight:700}}>Scale Weight</div><div style={{fontSize:10,color:C.t2}}>Last {range}</div></div>

              {wData.length>1?(
                <>
                  <SVGLineChart data={wData} dataKey="w" color={C.sodium} height={160}/>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:12}}>
                    {[{l:"Current",v:wData[wData.length-1].w},{l:"Min",v:Math.min(...wData.map(d=>d.w))},{l:"Max",v:Math.max(...wData.map(d=>d.w))},{l:"Δ",v:wData.length>1?+(wData[wData.length-1].w-wData[0].w).toFixed(1):"—"}].map(({l,v})=>(
                      <div key={l} style={{textAlign:"center",padding:"8px 4px",background:C.s3,borderRadius:9}}>
                        <div style={{fontFamily:F.mn,fontSize:14}}>{v}</div>
                        <div style={{fontSize:8,color:C.t2,marginTop:2}}>{l}</div>

                    ))}
                  </div>
                </>

            </div>

  <script type="text/babel">
function AddFoodModal({md,st,dp,toast}){
  const{meal,date}=md;
  const[tab,setTab]=useState("quick");
  const[prompt,setPrompt]=useState("");
  const[imgData,setImgData]=useState(null);
  const[imgUrl,setImgUrl]=useState(null);
  const[loading,setLoading]=useState(false);
  const[result,setResult]=useState(null);
  const[err,setErr]=useState(null);
  const fileRef=useRef();
  const[f,setF]=useState({name:"",cal:"",p:"",f:"",c:"",na:"",k:"",fb:"",amount:"",emoji:""});
  const totToday=sumDay(st.logs[date]);

  function logEntry(e){
    dp({t:"LOG_FOOD",date,meal,entry:{...e,cal:+e.cal||0,p:+e.p||0,f:+e.f||0,c:+e.c||0,na:+e.na||0,k:+e.k||0,fb:+e.fb||0,emoji:e.emoji||"🍽️",loggedAt:new Date().toISOString()}});
    toast(`Logged: ${e.name}`);
    dp({t:"MODAL",v:null});
  }

  function handleImg(e){
    const file=e.target.files?.[0]; if(!file)return;
    setImgUrl(URL.createObjectURL(file));
    const r=new FileReader();
    r.onload=ev=>setImgData(ev.target.result.split(",")[1]);
    r.readAsDataURL(file);
    setResult(null);setErr(null);
  }

  async function analyze(){
    if(!prompt.trim()&&!imgData)return;
    setLoading(true);setResult(null);setErr(null);
    try{
      const parts=[];
      if(imgData) parts.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:imgData}});
      parts.push({type:"text",text:`Analyze this food${imgData&&prompt?` with description: "${prompt}"`:imgData?"":`": "${prompt}"`}. Return ONLY a valid JSON object (no markdown, no preamble): {"name":string,"cal":number,"p":number,"f":number,"c":number,"na":number(mg),"k":number(mg),"fb":number(g),"amount":string,"emoji":string,"confidence":"high"|"medium"|"low","notes":string}`});
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:parts}]})});
      const data=await res.json();
      const txt=data.content?.map(c=>c.text||"").join("")||"";
      setResult(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    }catch(e){setErr("Analysis failed. Log manually or try again.");}
    setLoading(false);
  }

  const macroKcal=(+f.p||0)*4+(+f.f||0)*9+(+f.c||0)*4;

  return(
    <div className="ov" onClick={e=>e.target===e.currentTarget&&dp({t:"MODAL",v:null})}>
      <div className="sh">
        <div className="hdl"/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 16px 0"}}>
          <div><div style={{fontSize:10,color:C.t2}}>Adding to {meal}</div><div style={{fontWeight:700,fontSize:17}}>Log Food</div></div>
          <div style={{display:"flex",gap:8}}>
            <span className="cb">{totToday.cal} / {st.targets.cal||"—"}</span>
            <button className="ib" onClick={()=>dp({t:"MODAL",v:null})}><X size={14}/></button>
          </div>
        </div>
        <div style={{display:"flex",borderBottom:`1px solid ${C.b0}`,padding:"0 16px",marginTop:8}}>
          {[{id:"quick",l:"Quick Add"},{id:"ai",l:"AI"},{id:"scan",l:"Scan"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",color:tab===t.id?C.t0:C.t2,fontSize:13,fontWeight:600,padding:"10px 14px",cursor:"pointer",borderBottom:`2.5px solid ${tab===t.id?C.t0:"transparent"}`,fontFamily:F.bd}}>
              {t.l}{t.id==="ai"&&<span className="ab" style={{marginLeft:6}}>AI</span>}
            </button>
          ))}
        </div>
        <div style={{padding:"16px",maxHeight:"60vh",overflowY:"auto"}}>

          {tab==="quick"&&(
            <div>
              <div style={{marginBottom:12}}><div className="il">Food Name *</div><input className="inp" placeholder="e.g. 93% Lean Ground Beef" autoFocus value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                {[{k:"cal",l:"Calories",u:"kcal",c:C.cal},{k:"p",l:"Protein",u:"g",c:C.protein},{k:"f",l:"Fat",u:"g",c:C.fat},{k:"c",l:"Carbs",u:"g",c:C.carbs},{k:"na",l:"Sodium",u:"mg",c:C.sodium},{k:"k",l:"Potassium",u:"mg",c:C.potassium},{k:"fb",l:"Fiber",u:"g",c:C.fiber},{k:"amount",l:"Amount",u:"",c:C.t2}].map(({k,l,u,c})=>(
                  <div key={k}><div className="il" style={{color:c}}>{l}{u&&` (${u})`}</div><input className="inp" type={k==="amount"?"text":"number"} placeholder={k==="amount"?"200g":"0"} style={{padding:"10px 12px",fontSize:14}} value={f[k]} onChange={e=>setF(p=>({...p,[k]:e.target.value}))}/></div>
                ))}
              </div>
              {(f.p||f.f||f.c)&&f.cal&&<div style={{padding:"8px 12px",background:Math.abs(macroKcal-(+f.cal||0))<40?`${C.ok}18`:`${C.warn}18`,borderRadius:8,fontSize:11,color:Math.abs(macroKcal-(+f.cal||0))<40?C.ok:C.warn,marginBottom:12}}>Macro sum: {macroKcal} kcal vs {f.cal} entered{Math.abs(macroKcal-(+f.cal||0))>40?" — verify values":""}</div>}
              <div style={{marginBottom:14}}><div className="il">Emoji</div><input className="inp" maxLength={2} placeholder="🍗" value={f.emoji} style={{width:54,textAlign:"center",fontSize:22,padding:"8px"}} onChange={e=>setF(p=>({...p,emoji:e.target.value}))}/></div>
              <button className="btn-p" disabled={!f.name} onClick={()=>logEntry(f)}>Log to {meal}</button>
            </div>
          )}

          {tab==="ai"&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><div style={{fontWeight:600,fontSize:14}}>AI Nutrition Analysis</div><span className="ab">Claude Vision</span></div>
              <p style={{fontSize:12,color:C.t1,lineHeight:1.6,marginBottom:16}}>Upload a photo and/or describe your meal. Claude estimates nutrition. Always verify against known sources — AI estimates are not guaranteed.</p>
              <input type="file" ref={fileRef} accept="image/*" onChange={handleImg} style={{display:"none"}}/>
              <div style={{marginBottom:12}}>
                <div className="il">Photo (optional)</div>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn-g" style={{flex:1,padding:"11px 0",fontSize:13}} onClick={()=>fileRef.current?.click()}><Camera size={14} style={{verticalAlign:"middle",marginRight:6}}/>Upload Photo</button>
                  {imgUrl&&<div style={{width:50,height:50,borderRadius:8,overflow:"hidden",flexShrink:0}}><img src={imgUrl} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
                </div>
              </div>
              <div style={{marginBottom:14}}><div className="il">Description (optional)</div><textarea className="inp" rows={3} style={{resize:"none",lineHeight:1.5}} placeholder="e.g. 6oz grilled chicken breast, 1 cup white rice, steamed broccoli" value={prompt} onChange={e=>setPrompt(e.target.value)}/></div>
              <button className="btn-p" onClick={analyze} disabled={loading||(!prompt.trim()&&!imgData)}>{loading?"Analyzing…":"Analyze"}</button>
              {err&&<div style={{marginTop:12,padding:"10px 14px",background:`${C.danger}18`,borderRadius:10,border:`1px solid ${C.danger}35`,fontSize:12,color:C.danger}}>{err}</div>}
              {result&&!loading&&(
                <div style={{marginTop:16}}>
                  <div style={{padding:"8px 14px",marginBottom:12,borderRadius:10,background:result.confidence==="high"?`${C.ok}18`:`${C.warn}18`,border:`1px solid ${result.confidence==="high"?C.ok:C.warn}35`}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:600,color:result.confidence==="high"?C.ok:C.warn}}>{result.confidence==="high"?"High Confidence":"Review Before Logging"}</span><span style={{fontSize:10,color:C.t2}}>{result.confidence}</span></div>
                    {result.notes&&<p style={{fontSize:11,color:C.t1,marginTop:3}}>{result.notes}</p>}
                  </div>
                  <div style={{padding:"12px 14px",background:C.s3,borderRadius:12,border:`1px solid ${C.b2}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                      <div><div style={{fontSize:15,fontWeight:700}}>{result.emoji} {result.name}</div><div style={{fontSize:11,color:C.t2}}>{result.amount}</div></div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:12}}>
                      {[{l:"Cal",v:result.cal,u:"kcal",c:C.cal},{l:"Protein",v:result.p,u:"g",c:C.protein},{l:"Fat",v:result.f,u:"g",c:C.fat},{l:"Carbs",v:result.c,u:"g",c:C.carbs},{l:"Sodium",v:result.na,u:"mg",c:C.sodium},{l:"Potassium",v:result.k,u:"mg",c:C.potassium}].map(({l,v,u,c})=>(
                        <div key={l} style={{background:C.s4,borderRadius:8,padding:"7px 8px"}}><div style={{fontSize:9,color:C.t2}}>{l}</div><div style={{fontFamily:F.mn,fontSize:13,color:c}}>{v}<span style={{fontSize:9}}>{u}</span></div></div>
                      ))}
                    </div>
                    <button className="btn-p" onClick={()=>logEntry(result)}>Log This Food</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {tab==="scan"&&(
            <div style={{textAlign:"center",padding:"30px 0"}}>
              <ScanLine size={40} color={C.t2} style={{margin:"0 auto 12px"}}/>
              <div style={{fontWeight:600,fontSize:15,marginBottom:6}}>Barcode Scanner</div>
              <div style={{fontSize:12,color:C.t1,marginBottom:20}}>Scan a product barcode to pull nutrition info automatically.</div>
              <button className="btn-g" style={{width:"auto",padding:"12px 28px"}}>Open Camera</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

  </script>
  <script type="text/babel">
function AddWeightModal({dp,toast}){

        <span style={{flex:1,fontSize:14,color:C.t2}}>Search for a food</span>
        <ScanLine size={15} color={C.t2}/>
      </div>
    </div>
  );
}

// ── ROOT APP ───────────────────────────────────────────────────────────
  </script>
  <script type="text/babel">
function App(){
  const[st,dp]=useReducer(reduce,INIT);
  const{msg,show:toast}=useToast();

  function renderModal(){
    const{modal:m}=st;
    if(!m) return null;
    const pass={st,dp,toast};
    if(m==="quickLog")   return <QuickLog st={st} dp={dp}/>;
    if(m==="addW")       return <AddWeightModal dp={dp} toast={toast}/>;
    if(m==="addBF")      return <AddBFModal dp={dp} toast={toast}/>;
    if(m==="addMeas")    return <AddMeasModal dp={dp} toast={toast}/>;
    if(m==="addH")       return <AddHydrationModal dp={dp} toast={toast}/>;
    if(m==="addDig")     return <AddDigModal dp={dp} toast={toast}/>;
    if(m==="addPerf")    return <AddPerfModal dp={dp} toast={toast}/>;
    if(m==="editTgts")   return <EditTargetsModal {...pass}/>;
    if(m==="newGoal")    return <NewGoalModal {...pass}/>;
    if(m==="newProg")    return <NewProgModal {...pass}/>;
    if(m==="contestDate")return <ContestDateModal {...pass}/>;
    if(typeof m==="object"&&m.type==="addFood") return <AddFoodModal md={m} {...pass}/>;
    return null;
  }

  function renderScreen(){
    if(st.tab==="dashboard") return <Dashboard st={st} dp={dp}/>;
    if(st.tab==="foodlog")   return <FoodLog   st={st} dp={dp}/>;
    if(st.tab==="analytics") return <Analytics st={st} dp={dp}/>;
    if(st.tab==="strategy")  return <Strategy  st={st} dp={dp}/>;
    if(st.tab==="more")      return <More      st={st} dp={dp}/>;
    return <Dashboard st={st} dp={dp}/>;
  }

  const showSearch=st.tab==="dashboard"||st.tab==="foodlog";

  if(st.screen==="onboarding") return(
    <><Styles/><div className="shell"><Onboarding st={st} dp={dp}/></div></>
  );

  return(
    <>
      <Styles/>
      <div className="shell">
        {renderScreen()}
        {showSearch&&<SearchBar dp={dp} logDate={st.ui.logDate}/>}
        <BottomNav tab={st.tab} dp={dp} onFab={()=>dp({t:"MODAL",v:"quickLog"})}/>
        {renderModal()}
        {msg&&<div className="toast">{msg}</div>}
      </div>
    </>
  );
}

  </script>

  <script type="text/babel">
try {
  document.getElementById('loading').style.display = 'none';
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
} catch(e) {
  document.getElementById('loading').innerHTML = '<div style="color:#EF4444;padding:20px;font-size:13px;text-align:center"><b>Error</b><br/><pre style="font-size:10px;margin-top:8px;text-align:left;overflow:auto">' + (e.stack||e.message) + '</pre><button onclick="location.reload()" style="margin-top:12px;padding:10px 20px;background:#F0F0F0;color:#000;border:none;border-radius:8px;font-size:14px">Reload</button></div>';
}
  </script>
</body>
</html>
