<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#080808"/>
<title>IronIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#080808}body{padding-top:env(safe-area-inset-top);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
body{font-family:'DM Sans',system-ui,sans-serif;color:#F0F0F0;-webkit-font-smoothing:antialiased}
#app{max-width:430px;width:100%;height:100%;min-height:100vh;margin:0 auto;display:flex;flex-direction:column;background:#080808;position:relative;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:80px}
.screen::-webkit-scrollbar{display:none}
/* Typography */
.hd{font-family:'Barlow Condensed',sans-serif}
.mn{font-family:'DM Mono',monospace}
/* Colors */
:root{
  --s0:#080808;--s1:#101010;--s2:#161616;--s3:#1E1E1E;--s4:#262626;--s5:#2E2E2E;
  --b0:#181818;--b1:#222;--b2:#2E2E2E;--b3:#3A3A3A;
  --t0:#F0F0F0;--t1:#A0A0A0;--t2:#606060;--t3:#383838;
  --protein:#FF6B47;--fat:#FFB830;--carbs:#36CF7A;--cal:#4D9EF8;
  --sodium:#B39DFA;--potassium:#2DD4BF;--water:#38BDF8;--fiber:#86EFAC;
  --ok:#22C55E;--warn:#F59E0B;--danger:#EF4444;
}
/* Cards */
.card{background:var(--s2);border:1px solid var(--b1);border-radius:16px;padding:16px}
.card-xs{background:var(--s3);border:1px solid var(--b1);border-radius:10px;padding:10px}
/* Buttons */
.btn-p{background:var(--t0);color:var(--s0);border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;padding:16px;width:100%;cursor:pointer;transition:opacity .12s,transform .12s;display:block;text-align:center}
.btn-p:active{opacity:.8;transform:scale(.98)}
.btn-p:disabled{opacity:.3}
.btn-g{background:transparent;color:var(--t0);border:1.5px solid var(--b2);border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;padding:14px;width:100%;cursor:pointer;display:block;text-align:center}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--s3);border:1px solid var(--b2);border-radius:100px;color:var(--t0);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .12s}
.pill.on{background:var(--t0);color:var(--s0);border-color:var(--t0)}
.ib{width:30px;height:30px;border-radius:50%;background:var(--s3);border:1px solid var(--b1);color:var(--t0);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
.inp{background:var(--s3);border:1.5px solid var(--b2);border-radius:10px;color:var(--t0);font-family:'DM Mono',monospace;font-size:15px;padding:12px 14px;width:100%;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--cal)}
.inp::placeholder{color:var(--t3);font-family:'DM Sans',sans-serif}
textarea.inp{resize:none;font-family:'DM Sans',sans-serif;line-height:1.5}
.il{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);margin-bottom:6px;display:block}
/* Bars */
.btr{height:3px;background:var(--s4);border-radius:100px;overflow:hidden}
.btf{height:100%;border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1)}
/* Nav */
.nav{background:var(--s0);border-top:1px solid var(--b0);display:flex;align-items:center;padding-bottom:env(safe-area-inset-bottom,6px);flex-shrink:0;z-index:50}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 4px 2px;background:none;border:none;color:var(--t2);transition:color .15s;font-family:'DM Sans',sans-serif}
.ni.on{color:var(--t0)}
.ni span{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.fab{width:54px;height:54px;border-radius:50%;background:var(--t0);color:var(--s0);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(240,240,240,.14);transition:transform .15s;font-size:24px}
.fab:active{transform:scale(.9)}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;flex-direction:column;justify-content:flex-end}
.sh{background:var(--s1);border-radius:22px 22px 0 0;border-top:1px solid var(--b1);max-height:94vh;overflow-y:auto;scrollbar-width:none}
.sh::-webkit-scrollbar{display:none}
.hdl{width:36px;height:4px;background:var(--s5);border-radius:100px;margin:12px auto;display:block}
/* Misc */
.row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--b0)}
.row:last-child{border-bottom:none}
.hg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hc{aspect-ratio:1;border-radius:3px;background:var(--s4)}
.sr{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.sr::-webkit-scrollbar{display:none}
.tabs{display:flex;background:var(--s3);border:1px solid var(--b1);border-radius:100px;padding:3px}
.tab{flex:1;text-align:center;padding:8px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;color:var(--t1);transition:all .15s}
.tab.on{background:var(--t0);color:var(--s0)}
.sw{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--b1);border-radius:100px;padding:11px 16px;cursor:pointer}
.st{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2);margin-bottom:10px;margin-top:20px;display:block}
.pll{height:2px;background:var(--s4);border-radius:100px;overflow:hidden}
.pf{height:100%;background:var(--t0);border-radius:100px;transition:width .3s}
.ab{background:linear-gradient(135deg,#4D9EF8,#B39DFA);color:#fff;font-size:9px;font-weight:800;letter-spacing:1.2px;padding:3px 8px;border-radius:5px;text-transform:uppercase;display:inline-block}
.pt{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);color:var(--danger);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:6px;display:inline-block}
.em{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;gap:10px;text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .25s ease forwards}
.go{display:flex;align-items:flex-start;gap:14px;padding:16px;background:var(--s2);border:1.5px solid var(--b2);border-radius:14px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.go.on{border-color:var(--t0);background:var(--s3)}
.rad{width:22px;height:22px;border-radius:50%;border:2px solid var(--t2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.rad.on{border-color:var(--t0);background:var(--t0)}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:100px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--t0);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.toast{animation:fu .2s ease;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--b2);border-radius:100px;padding:10px 20px;font-size:13px;font-weight:500;z-index:500;white-space:nowrap;pointer-events:none}
/* SVG Charts */
.chart-wrap{width:100%;overflow:hidden}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const {createElement:h,useState,useReducer,useRef,useMemo,useCallback,useEffect,Fragment} = React;

// ── UTILS ─────────────────────────────────────────────────────────────
const td=()=>new Date().toISOString().split('T')[0];
const fmtDs=d=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
const dMinus=(s,n)=>{const d=new Date(s+'T12:00:00');d.setDate(d.getDate()-n);return d.toISOString().split('T')[0]};
const dPlus=(s,n)=>{const d=new Date(s+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]};
const pastN=(n,from=td())=>Array.from({length:n},(_,i)=>dMinus(from,n-1-i));
const pct=(v,t)=>(!t||t<=0)?0:Math.min(Math.round(v/t*100),999);
const clamp=(v,mn,mx)=>Math.min(Math.max(v,mn),mx);
const sumDay=dl=>{
  if(!dl?.meals)return{cal:0,p:0,f:0,c:0,na:0,k:0,fb:0,w:0};
  return Object.values(dl.meals).flat().reduce((a,e)=>({
    cal:a.cal+(+e.cal||0),p:a.p+(+e.p||0),f:a.f+(+e.f||0),c:a.c+(+e.c||0),
    na:a.na+(+e.na||0),k:a.k+(+e.k||0),fb:a.fb+(+e.fb||0),w:a.w+(+e.w||0)
  }),{cal:0,p:0,f:0,c:0,na:0,k:0,fb:0,w:0});
};
const wtTrend=wts=>{
  if(!wts.length)return{cur:null,avg:null,chg:null,data:[]};
  const s=[...wts].sort((a,b)=>a.date.localeCompare(b.date));
  const r=s.slice(-7),cur=r[r.length-1]?.w||null;
  const avg=r.length?+(r.reduce((a,x)=>a+x.w,0)/r.length).toFixed(1):null;
  const pv=s.slice(-14,-7),pa=pv.length?pv.reduce((a,x)=>a+x.w,0)/pv.length:null;
  return{cur,avg,chg:(avg&&pa)?+(avg-pa).toFixed(1):null,data:r};
};
const MEALS=['Morning','Midday','Afternoon','Evening','Night'];
const MICO={Morning:'🌅',Midday:'☀️',Afternoon:'🌤️',Evening:'🌙',Night:'⭐'};
const GLABELS={cut:'Cut / Prep',maintain:'Maintenance',bulk:'Offseason Bulk',prep:'Peak Week'};

// ── STATE ─────────────────────────────────────────────────────────────
const INIT={
  screen:'onboarding',tab:'dashboard',modal:null,ob:{step:0},
  profile:{name:'',initials:'',memberSince:null,units:'imperial',height:null},
  strategy:{goal:null,programStyle:null,program:null,contestDate:null},
  targets:{cal:null,p:null,f:null,c:null,na:null,k:null,w:null,fb:null},
  logs:{},
  metrics:{weights:[],bodyfat:[],measurements:[],hydration:[],photos:[],digestion:[],performance:[]},
  ui:{logDate:td(),aRange:'7d',aSec:'weight'},
};
function reduce(st,a){
  switch(a.t){
    case 'SCREEN':return{...st,screen:a.v};
    case 'TAB':return{...st,tab:a.v};
    case 'MODAL':return{...st,modal:a.v};
    case 'OB_NEXT':return{...st,ob:{...st.ob,step:st.ob.step+1}};
    case 'OB_BACK':return{...st,ob:{...st.ob,step:Math.max(0,st.ob.step-1)}};
    case 'OB_DONE':return{...st,screen:'main'};
    case 'PROFILE':return{...st,profile:{...st.profile,...a.v}};
    case 'STRATEGY':return{...st,strategy:{...st.strategy,...a.v}};
    case 'TARGETS':return{...st,targets:{...st.targets,...a.v}};
    case 'LOG_FOOD':{
      const{date,meal,entry}=a,dl=st.logs[date]||{meals:{},note:''};
      return{...st,logs:{...st.logs,[date]:{...dl,meals:{...dl.meals,[meal]:[...(dl.meals[meal]||[]),entry]}}}};
    }
    case 'DEL_FOOD':{
      const dl=st.logs[a.date];if(!dl)return st;
      return{...st,logs:{...st.logs,[a.date]:{...dl,meals:{...dl.meals,[a.meal]:(dl.meals[a.meal]||[]).filter((_,i)=>i!==a.idx)}}}};
    }
    case 'LOG_NOTE':{const dl=st.logs[a.date]||{meals:{},note:''};return{...st,logs:{...st.logs,[a.date]:{...dl,note:a.note}}};}
    case 'LOG_W':return{...st,metrics:{...st.metrics,weights:[...st.metrics.weights,a.v]}};
    case 'LOG_BF':return{...st,metrics:{...st.metrics,bodyfat:[...st.metrics.bodyfat,a.v]}};
    case 'LOG_MEAS':return{...st,metrics:{...st.metrics,measurements:[...st.metrics.measurements,a.v]}};
    case 'LOG_H':return{...st,metrics:{...st.metrics,hydration:[...st.metrics.hydration,a.v]}};
    case 'LOG_DIG':return{...st,metrics:{...st.metrics,digestion:[...st.metrics.digestion,a.v]}};
    case 'LOG_PERF':return{...st,metrics:{...st.metrics,performance:[...st.metrics.performance,a.v]}};
    case 'UI':return{...st,ui:{...st.ui,...a.v}};
    default:return st;
  }
}

// ── ICONS (inline SVG) ────────────────────────────────────────────────
const Icon=({d,size=18,color='currentColor',strokeWidth=2})=>
  h('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:color,strokeWidth,strokeLinecap:'round',strokeLinejoin:'round'},
    h('path',{d}));

const IC={
  dashboard:'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10',
  food:'M18 8h1a4 4 0 0 1 0 8h-1 M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z M6 1v3 M10 1v3 M14 1v3',
  chart:'M18 20V10 M12 20V4 M6 20v-6',
  more:'M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0-2 0 M19 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0-2 0 M5 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0-2 0',
  plus:'M12 5v14 M5 12h14',
  back:'M19 12H5 M12 19l-7-7 7-7',
  right:'M9 18l6-6-6-6',
  left:'M15 18l-6-6 6-6',
  x:'M18 6L6 18 M6 6l12 12',
  scale:'M12 2a5 5 0 0 1 5 5c0 5-5 11-5 11S7 12 7 7a5 5 0 0 1 5-5z M9 9h.01',
  drop:'M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z',
  activity:'M22 12h-4l-3 9L9 3l-3 9H2',
  target:'M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12z M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z',
  camera:'M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8z',
  edit:'M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z',
  cal:'M8 2v4 M16 2v4 M3 10h18 M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z',
  user:'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z',
  settings:'M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16z M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z',
  download:'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3',
  trash:'M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2',
  star:'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z',
  brain:'M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2z M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2z',
  layers:'M12 2L2 7l10 5 10-5-10-5z M2 17l10 5 10-5 M2 12l10 5 10-5',
  dumbbell:'M6.5 6.5h11 M17.5 6.5v11 M6.5 17.5h11 M6.5 6.5v11',
  refresh:'M23 4v6h-6 M1 20v-6h6 M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15',
  sliders:'M4 21v-7 M4 10V3 M12 21v-9 M12 8V3 M20 21v-5 M20 12V3 M1 14h6 M9 8h6 M17 16h6',
  scan:'M3 7V5a2 2 0 0 1 2-2h2 M17 3h2a2 2 0 0 1 2 2v2 M21 17v2a2 2 0 0 1-2 2h-2 M7 21H5a2 2 0 0 1-2-2v-2',
  info:'M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 8h.01 M12 12v4',
  check:'M20 6L9 17l-5-5',
  zap:'M13 2L3 14h9l-1 8 10-12h-9l1-8z',
  trendUp:'M23 6l-9.5 9.5-5-5L1 18 M17 6h6v6',
  trendDown:'M23 18l-9.5-9.5-5 5L1 6 M17 18h6v-6',
  search:'M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16z M21 21l-4.35-4.35',
};

const Ico=({n,size=18,color='currentColor',sw=2})=>{
  const d=IC[n];
  if(!d)return null;
  return h('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:color,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'},
    ...d.split(' M ').filter(Boolean).map((seg,i)=>h('path',{key:i,d:i===0?seg:'M '+seg}))
  );
};

// ── SHARED COMPONENTS ────────────────────────────────────────────────
function Ring({size=130,stroke=9,val=0,max=1,color='#4D9EF8',children}){
  const r=(size-stroke)/2,circ=2*Math.PI*r;
  const ratio=max>0?clamp(val/max,0,1):0,off=circ-ratio*circ;
  const rc=ratio>1.05?'#EF4444':ratio>0.88?'#F59E0B':color;
  return h('div',{style:{position:'relative',width:size,height:size,display:'flex',alignItems:'center',justifyContent:'center'}},
    h('svg',{width:size,height:size,style:{position:'absolute',transform:'rotate(-90deg)'}},
      h('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:'#262626',strokeWidth:stroke}),
      h('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:rc,strokeWidth:stroke,
        strokeDasharray:circ,strokeDashoffset:off,strokeLinecap:'round',
        style:{transition:'stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)'}})
    ),
    h('div',{style:{position:'relative',textAlign:'center'}},children)
  );
}

function MBar({label,val,tgt,color}){
  const p=pct(val,tgt);
  return h('div',{style:{flex:1,minWidth:0}},
    h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:3}},
      h('span',{style:{fontSize:11,color:'#A0A0A0',fontWeight:500}},label),
      h('span',{className:'mn',style:{fontSize:10,color:'#606060'}},val,'/',(tgt||'—'))
    ),
    h('div',{className:'btr'},h('div',{className:'btf',style:{width:clamp(p,0,100)+'%',background:color}}))
  );
}

function BarChart({data,key1,color='#4D9EF8',refVal=0,height=110,getColor=null}){
  if(!data?.length)return h('div',{style:{height,display:'flex',alignItems:'center',justifyContent:'center',color:'#606060',fontSize:11}},'No data');
  const vals=data.map(d=>+d[key1]||0),mx=Math.max(...vals,refVal||0,1);
  const W=300,H=height-18,PAD=2;
  const bw=(W-PAD*2*(data.length+1))/data.length;
  return h('div',{className:'chart-wrap'},
    h('svg',{viewBox:`0 0 ${W} ${H+18}`,style:{width:'100%',height},preserveAspectRatio:'none'},
      refVal>0&&h('line',{x1:PAD,y1:H-((refVal/mx)*(H-PAD*2))-PAD,x2:W-PAD,y2:H-((refVal/mx)*(H-PAD*2))-PAD,stroke:'#FF6B4780',strokeWidth:1.5,strokeDasharray:'4,3'}),
      ...data.map((d,i)=>{
        const v=+d[key1]||0,bh=Math.max((v/mx)*(H-PAD*2),v>0?2:0);
        const x=PAD*(i+1)+bw*i,y=H-bh-PAD;
        const c=getColor?getColor(d,i):color;
        return h('rect',{key:i,x,y,width:bw,height:bh,fill:c,rx:2});
      }),
      ...data.filter((_,i)=>i===0||i===data.length-1||i===Math.floor(data.length/2)).map((d,_,arr)=>{
        const i=data.indexOf(d),x=PAD*(i+1)+bw*i+bw/2;
        return h('text',{key:i,x,y:H+14,textAnchor:'middle',fontSize:8,fill:'#606060'},d.date||'');

}

function LineChart({data,key1,color='#B39DFA',height=110}){
  if(!data||data.length<2)return h('div',{style:{height,display:'flex',alignItems:'center',justifyContent:'center',color:'#606060',fontSize:11}},'No data');
  const vals=data.map(d=>+d[key1]||0).filter(v=>v>0);
  if(vals.length<2)return h('div',{style:{height}});
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=300,H=height-18,PAD=4;
  const filtered=data.filter(d=>+d[key1]>0);
  const pts=filtered.map((d,i)=>{
    const x=(i/(filtered.length-1||1))*(W-PAD*2)+PAD;
    const y=H-((+d[key1]-mn)/rng)*(H-PAD*2)-PAD;
    return `${x},${y}`;
  }).join(' ');
  return h('div',{className:'chart-wrap'},
    h('svg',{viewBox:`0 0 ${W} ${H+18}`,style:{width:'100%',height},preserveAspectRatio:'none'},
      h('polyline',{points:pts,fill:'none',stroke:color,strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round'}),
      ...filtered.map((d,i)=>{
        const x=(i/(filtered.length-1||1))*(W-PAD*2)+PAD;
        const y=H-((+d[key1]-mn)/rng)*(H-PAD*2)-PAD;
        return h('circle',{key:i,cx:x,cy:y,r:3,fill:color});
      }),
      ...filtered.filter((_,i)=>i===0||i===filtered.length-1).map((d,j)=>{
        const i=filtered.indexOf(d),x=(i/(filtered.length-1||1))*(W-PAD*2)+PAD;
        return h('text',{key:j,x,y:H+14,textAnchor:'middle',fontSize:8,fill:'#606060'},d.date||'');
      })
    )
  );
}

function Sparkline({data,key1,color='#B39DFA',height=46}){
  if(!data||data.length<2)return h('div',{style:{height}});
  const vals=data.map(d=>+d[key1]||0).filter(v=>v>0);
  if(vals.length<2)return h('div',{style:{height}});
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=200,H=height,PAD=3;
  const filtered=data.filter(d=>+d[key1]>0);
  const pts=filtered.map((d,i)=>{
    const x=(i/(filtered.length-1||1))*(W-PAD*2)+PAD;
    const y=H-((+d[key1]-mn)/rng)*(H-PAD*2)-PAD;
    return `${x},${y}`;
  }).join(' ');
  return h('div',{className:'chart-wrap'},
    h('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:'100%',height},preserveAspectRatio:'none'},
      h('polyline',{points:pts,fill:'none',stroke:color,strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'})
    )
  );
}

function AddFoodModal({md,st,dp,toast}){
  const{meal,date}=md;
  const[tab,setTab]=useState('quick');
  const[aiPrompt,setAiPrompt]=useState('');
  const[imgData,setImgData]=useState(null);
  const[imgUrl,setImgUrl]=useState(null);
  const[loading,setLoading]=useState(false);
  const[result,setResult]=useState(null);
  const[err,setErr]=useState(null);
  const fileRef=useRef();
  const[f,setF]=useState({name:'',cal:'',p:'',f:'',c:'',na:'',k:'',fb:'',amount:'',emoji:''});
  const tot=sumDay(st.logs[date]);

  function logEntry(e){
    dp({t:'LOG_FOOD',date,meal,entry:{...e,cal:+e.cal||0,p:+e.p||0,f:+e.f||0,c:+e.c||0,na:+e.na||0,k:+e.k||0,fb:+e.fb||0,emoji:e.emoji||'🍽️',loggedAt:new Date().toISOString()}});
    toast('Logged: '+e.name);dp({t:'MODAL',v:null});
  }

  function handleImg(e){
    const file=e.target.files?.[0];if(!file)return;
    setImgUrl(URL.createObjectURL(file));
    const r=new FileReader();r.onload=ev=>setImgData(ev.target.result.split(',')[1]);r.readAsDataURL(file);
    setResult(null);setErr(null);
  }

  async function analyze(){
    if(!aiPrompt.trim()&&!imgData)return;
    setLoading(true);setResult(null);setErr(null);
    try{
      const parts=[];
      if(imgData)parts.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgData}});
      parts.push({type:'text',text:'Analyze this food'+(imgData&&aiPrompt?` with description: "${aiPrompt}"`:imgData?'':`": "${aiPrompt}"`)+ '. Return ONLY valid JSON (no markdown): {"name":string,"cal":number,"p":number,"f":number,"c":number,"na":number,"k":number,"fb":number,"amount":string,"emoji":string,"confidence":"high"|"medium"|"low","notes":string}'});
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:parts}]})});
      const data=await res.json();
      const txt=data.content?.map(c=>c.text||'').join('')||'';
      setResult(JSON.parse(txt.replace(/```json|```/g,'').trim()));
    }catch(e){setErr('Analysis failed. Log manually.');}
    setLoading(false);
  }

  return h(Sheet,{onClose:()=>dp({t:'MODAL',v:null})},

        h('button',{className:'ib',onClick:()=>dp({t:'MODAL',v:null})},h(Ico,{n:'x',size:14}))
      )
    ),
    h('div',{style:{display:'flex',borderBottom:'1px solid #181818',padding:'0 16px',marginTop:8}},
      ...[{id:'quick',l:'Quick Add'},{id:'ai',l:'AI'},{id:'scan',l:'Scan'}].map(t=>
        h('button',{key:t.id,onClick:()=>setTab(t.id),style:{background:'none',border:'none',color:tab===t.id?'#F0F0F0':'#606060',fontSize:13,fontWeight:600,padding:'10px 14px',cursor:'pointer',borderBottom:'2.5px solid '+(tab===t.id?'#F0F0F0':'transparent'),fontFamily:"'DM Sans',sans-serif",display:'flex',alignItems:'center',gap:6}},
          t.l,t.id==='ai'&&h('span',{className:'ab'},'AI')
        )
      )
    ),
    h('div',{style:{padding:16,maxHeight:'60vh',overflowY:'auto'}},
      tab==='quick'&&h('div',null,
        h('div',{style:{marginBottom:12}},h('label',{className:'il'},'Food Name *'),h('input',{className:'inp',placeholder:'e.g. 93% Lean Ground Beef',autoFocus:true,value:f.name,onChange:e=>setF(p=>({...p,name:e.target.value}))})),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}},
          ...[{k:'cal',l:'Calories',u:'kcal',c:'#4D9EF8'},{k:'p',l:'Protein',u:'g',c:'#FF6B47'},{k:'f',l:'Fat',u:'g',c:'#FFB830'},{k:'c',l:'Carbs',u:'g',c:'#36CF7A'},{k:'na',l:'Sodium',u:'mg',c:'#B39DFA'},{k:'k',l:'Potassium',u:'mg',c:'#2DD4BF'},{k:'fb',l:'Fiber',u:'g',c:'#86EFAC'},{k:'amount',l:'Amount',u:'',c:'#606060'}].map(({k,l,u,c})=>
            h('div',{key:k},h('label',{className:'il',style:{color:c}},l+(u?' ('+u+')':'')),h('input',{className:'inp',type:k==='amount'?'text':'number',placeholder:k==='amount'?'200g':'0',style:{padding:'10px 12px',fontSize:14},value:f[k],onChange:e=>setF(p=>({...p,[k]:e.target.value}))}))

        err&&h('div',{style:{marginTop:12,padding:'10px 14px',background:'rgba(239,68,68,.12)',borderRadius:10,border:'1px solid rgba(239,68,68,.3)',fontSize:12,color:'#EF4444'}},err),

function NewProgModal({st,dp,toast}){
  const[name,setName]=useState('Manual Program');
  const[style,setStyle]=useState('flat');
  const[cal,setCal]=useState(st.targets.cal||'');
  const[p,setP]=useState(st.targets.p||'');
  const[f,setF]=useState(st.targets.f||'');
  const[c,setC]=useState(st.targets.c||'');
  const[days,setDays]=useState(Array(7).fill(null).map(()=>({cal:'',p:'',f:'',c:''})));
  function setDay(i,k,v){setDays(d=>d.map((x,j)=>j===i?{...x,[k]:v}:x));}
  function save(){
    if(!cal)return;
    const base={cal:+cal,p:+p||0,f:+f||0,c:+c||0};
    const prog={name,style,...base,startDate:td(),days:style==='flat'?Array(7).fill(base):days.map((d)=>({cal:d.cal?+d.cal:base.cal,p:d.p?+d.p:base.p,f:d.f?+d.f:base.f,c:d.c?+d.c:base.c}))};
    dp({t:'STRATEGY',v:{program:prog}});
    dp({t:'TARGETS',v:{cal:+cal,p:+p||undefined,f:+f||undefined,c:+c||undefined}});
    toast('Program created');dp({t:'MODAL',v:null});
  }
  return h(Sheet,{onClose:()=>dp({t:'MODAL',v:null})},
    h('div',{style:{padding:16}},
      h('div',{style:{fontWeight:700,fontSize:18,marginBottom:16}},'New Program'),
      h('label',{className:'il'},'Name'),h('input',{className:'inp',value:name,onChange:e=>setName(e.target.value),style:{marginBottom:12}}),
      h('div',{style:{marginBottom:16}},h('label',{className:'il'},'Style'),h('div',{className:'tabs'},h('div',{className:'tab '+(style==='flat'?'on':''),onClick:()=>setStyle('flat')},'Flat (same daily)'),h('div',{className:'tab '+(style==='split'?'on':''),onClick:()=>setStyle('split')},'Day Split'))),
      h('label',{className:'il',style:{marginBottom:8}},style==='split'?'Base Macros':'Daily Macros'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}},
        ...[{k:'cal',v:cal,s:setCal,u:'kcal',c:'#4D9EF8'},{k:'p',v:p,s:setP,u:'g',c:'#FF6B47'},{k:'f',v:f,s:setF,u:'g',c:'#FFB830'},{k:'c',v:c,s:setC,u:'g',c:'#36CF7A'}].map(({k,v,s,u,c})=>
          h('div',{key:k},h('label',{className:'il',style:{color:c}},k+' ('+u+')'),h('input',{className:'inp',type:'number',placeholder:'0',style:{padding:'10px 12px',fontSize:14},value:v,onChange:e=>s(e.target.value)}))
        )
      ),
      style==='split'&&h('div',{style:{marginBottom:12}},
        h('label',{className:'il',style:{marginBottom:8}},'Day Overrides (blank = base)'),
        ...['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((day,i)=>
          h('div',{key:i,style:{marginBottom:8,padding:'10px 12px',background:'#1E1E1E',borderRadius:10}},
            h('div',{style:{fontSize:11,fontWeight:600,marginBottom:8,color:'#A0A0A0'}},day),
            h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}},
              ...['cal','p','f','c'].map(k=>h('input',{key:k,className:'inp',type:'number',placeholder:k==='cal'?cal||'—':k==='p'?p||'—':k==='f'?f||'—':c||'—',style:{padding:'7px 8px',fontSize:11},value:days[i][k],onChange:e=>setDay(i,k,e.target.value)}))
            )
          )
        )
      ),
      h('button',{className:'btn-p',onClick:save,disabled:!cal},'Create Program')
    )
  );
}

// ── NAV ──────────────────────────────────────────────────────────────
function BottomNav({tab,dp,onFab}){
  return h('div',{className:'nav'},
    ...[{id:'dashboard',l:'Dashboard',ic:'dashboard'},{id:'foodlog',l:'Food Log',ic:'food'},{id:'_fab',l:'',ic:null},{id:'analytics',l:'Analytics',ic:'chart'},{id:'more',l:'More',ic:'more'}].map(item=>{

        h('button',{className:'fab',onClick:onFab},'+')
      );

      );

function SearchBar({dp,logDate}){
  return h('div',{style:{padding:'0 16px 8px',background:'#080808',borderTop:'1px solid rgba(24,24,24,.3)'}},

      h(Ico,{n:'search',size:15,color:'#606060'}),

// ── APP ──────────────────────────────────────────────────────────────
function App(){
  const[st,dp]=useReducer(reduce,INIT);
  const{msg,show:toast}=useToast();

  function renderModal(){
    const m=st.modal;if(!m)return null;
    const pass={st,dp,toast};
    if(m==='quickLog')return h(QuickLog,{st,dp});
    if(m==='addW')return h(AddWeightModal,{dp,toast});
    if(m==='addBF')return h(AddBFModal,{dp,toast});
    if(m==='addMeas')return h(AddMeasModal,{dp,toast});
    if(m==='addH')return h(AddHydrationModal,{dp,toast});
    if(m==='addDig')return h(AddDigModal,{dp,toast});
    if(m==='addPerf')return h(AddPerfModal,{dp,toast});
    if(m==='editTgts')return h(EditTargetsModal,pass);
    if(m==='newGoal')return h(NewGoalModal,pass);
    if(m==='newProg')return h(NewProgModal,pass);
    if(m==='contestDate')return h(ContestDateModal,pass);
    if(typeof m==='object'&&m.type==='addFood')return h(AddFoodModal,{md:m,...pass});
    return null;
  }

  if(st.screen==='onboarding')return h(Onboarding,{st,dp});

  return h('div',{id:'app'},
    st.tab==='dashboard'&&h(Dashboard,{st,dp}),
    st.tab==='foodlog'&&h(FoodLog,{st,dp}),
    st.tab==='analytics'&&h(Analytics,{st,dp}),
    st.tab==='strategy'&&h(Strategy,{st,dp}),
    st.tab==='more'&&h(More,{st,dp}),
    (st.tab==='dashboard'||st.tab==='foodlog')&&h(SearchBar,{dp,logDate:st.ui.logDate}),
    h(BottomNav,{tab:st.tab,dp,onFab:()=>dp({t:'MODAL',v:'quickLog'})}),
    renderModal(),
    msg&&h('div',{className:'toast'},msg)
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>
